<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #0b1224;
        color: #e6ecff;
      }

      article {
        max-width: 560px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <article>
      <h1>You are offline</h1>
      <p>
        The app shell is available, but network requests are currently unavailable.
        Your commands will be queued and retried automatically when connection returns.
      </p>
    </article>
  </body>
</html>
